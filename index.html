<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Benchmark Map · Global tracking de modelos de IA</title>
  <link rel="preconnect" href="https://basemaps.cartocdn.com" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- ================= TITLE BAR ================= -->
    <header class="titlebar">
      <div class="title-main">
        <h1>AI&nbsp;Benchmark&nbsp;Map</h1>
        <span class="subtitle">Global tracking de modelos de inteligencia artificial por origen geográfico</span>
      </div>
      <div class="title-meta">
        <span class="live-badge"><span class="live-dot"></span>LIVE</span>
        <span class="updated" id="updated">Cargando…</span>
      </div>
    </header>

    <!-- ================= DASHBOARD ================= -->
    <main class="dashboard">
      <!-- LEFT RAIL: big totals + country breakdown -->
      <aside class="rail rail-left">
        <div class="totals" id="totals"></div>
        <div class="breakdown">
          <div class="rail-heading">Modelos por país</div>
          <ul class="country-list" id="country-list"></ul>
        </div>
      </aside>

      <!-- CENTER: map -->
      <section class="map-wrap">
        <div id="map"></div>
        <div class="legend" aria-hidden="true">
          <span class="legend-item"><i class="dot prop"></i>Propietario</span>
          <span class="legend-item"><i class="dot open"></i>Open source</span>
          <span class="legend-sep"></span>
          <span class="legend-item legend-scale"><i class="ring s"></i><i class="ring m"></i><i class="ring l"></i>Score</span>
        </div>
      </section>

      <!-- RIGHT RAIL: filters + ranking / chart -->
      <aside class="rail rail-right">
        <div class="filters">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="filter-search" placeholder="Buscar modelo o empresa…" autocomplete="off" />
          </div>
          <div class="filter-row">
            <select id="filter-country" aria-label="Filtrar por país">
              <option value="">Todos los países</option>
            </select>
            <div class="segmented" id="filter-license" role="group" aria-label="Filtrar por licencia">
              <button class="seg active" data-val="">Todos</button>
              <button class="seg" data-val="open">Open</button>
              <button class="seg" data-val="proprietary">Propio</button>
            </div>
          </div>
        </div>

        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="ranking" role="tab">Ranking</button>
          <button class="tab" data-tab="chart" role="tab">Benchmarks</button>
        </div>

        <div class="panel-body">
          <div class="tab-panel active" data-panel="ranking">
            <ol class="leaderboard" id="leaderboard"></ol>
            <p class="empty-state" id="empty-state" hidden>Sin resultados para este filtro.</p>
          </div>
          <div class="tab-panel" data-panel="chart">
            <div id="chart"></div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
